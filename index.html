<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holaaa ✨</title>
    <style>
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a4a4a;
        }

      
        .card {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 320px;
            width: 85%;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4);
        }

        
        .heart-icon {
            font-size: 40px;
            color: #ff758f;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }

        /* Textos */
        h1 {
            font-size: 24px;
            margin: 0 0 12px 0;
            color: #ff4d6d;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            line-height: 1.5;
            margin: 0 0 20px 0;
            color: #5c5c5c;
        }

        
        .btn {
            display: inline-block;
            background-color: #ff758f;
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(255, 117, 143, 0.3);
            transition: background-color 0.2s, transform 0.1s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #ff4d6d;
        }

        .btn:active {
            transform: scale(0.95);
        }

        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
   </style>
</head>
<body>

    <div class="card">
        <h1>Holaa &lt;3, cómo estás?</h1>
        <p>Espero que tu día haya estado súper jeje </p>
        <button class="btn" onclick="alert('Byeee')">No lo presiones jeje</button>
    </div>

</body>
</html>
